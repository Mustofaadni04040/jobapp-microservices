job-service:
  url: http://job:8082
company-service:
  url: http://company:8081
review-service:
  url: http://review:8083

spring:
  application:
    name: company-service
  datasource:
    url: jdbc:postgresql://postgres_jobapp:5433/company
    username:
    password:
  jpa:
    database: PostgreSQL
    show-sql: true
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

server:
  port: 8081

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://servicereg:8761/eureka/

management:
  zipkin:
    tracing:
      endpoint: http://zipkin_jobapp:9411/api/v2/spans
  tracing:
    sampling:
      probability: 1.0