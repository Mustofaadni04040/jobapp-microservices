job-service:
  url: http://job:8082
company-service:
  url: http://company:8081
review-service:
  url: http://review:8083

spring:
  application:
    name: job-service
  datasource:
    url: jdbc:postgresql://postgres_jobapp:5433/job
    username:
    password:
  jpa:
    database: PostgreSQL
    show-sql: true
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  config:
    import: optional:configserver://config-server:8080
server:
  port: 8082

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://servicereg:8761/eureka/

management:
  zipkin:
    tracing:
      endpoint: http://zipkin_jobapp:9411/api/v2/spans
  tracing:
    sampling:
      probability: 1.0
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true

resilience4j:
  circuitbreaker:
    instances:
      companyBreaker:
        registerHealthIndicator: true
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        permittedNumberOfCallsInHalfOpenState: 5
        waitDurationInOpenState: 60s
        failureRateThreshold: 80
        automatic-transition-from-open-to-half-open-enabled: true
        sliding-window-type: count_based
#  retry:
#    instances:
#      companyRetry:
#        max-attempts: 3
#        wait-duration: 2s
  ratelimiter:
    instances:
      companyBreaker:
        limit-for-period: 10
        limit-refresh-period: 4s
        timeout-duration: 0s