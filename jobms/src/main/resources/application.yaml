spring:
  application:
    name: job-service
  datasource:
    url: jdbc:postgresql://localhost:5433/job
    username:
    password:
  jpa:
    database: PostgreSQL
    show-sql: true
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  config:
    import: optional:configserver://localhost:8080
server:
  port: 8082

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  tracing:
    sampling:
      probability: 1.0