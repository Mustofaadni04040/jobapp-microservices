job-service:
  url: http://localhost:8082
company-service:
  url: http://localhost:8081
review-service:
  url: http://localhost:8083

spring:
  application:
    name: review-service
  datasource:
    url: jdbc:postgresql://localhost:5433/review
    username:
    password:
  jpa:
    database: PostgreSQL
    show-sql: true
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
server:
  port: 8083

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  tracing:
    sampling:
      probability: 1.0